global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'sentiment-ai'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'sentiment-staging:8000' # nom DNS Docker

  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'